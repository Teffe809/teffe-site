<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teffe Press — Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --azul:#1A3F80;--azul-light:#2451A3;--azul-dark:#122d5c;
  --laranja:#E07820;--laranja-light:#f08c35;
  --bg:#F4F6FB;--sidebar-w:240px;
  --white:#fff;--gray:#6B7280;--gray-light:#E5E7EB;--gray-lighter:#F9FAFB;
  --success:#16A34A;--warning:#D97706;--danger:#DC2626;--info:#2563EB;
  --radius:10px;--shadow:0 2px 8px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:#1F2937;background:var(--bg);}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--azul) 0%,var(--azul-light) 50%,#1e5ba8 100%);}
.login-card{background:var(--white);border-radius:16px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo img{height:44px;}
.login-logo .brand{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--azul);margin-top:8px;}
.login-logo .brand span{color:var(--laranja);}
.login-card h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--azul);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--gray);margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-group input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;transition:border .2s;}
.form-group input:focus{outline:none;border-color:var(--azul);}
.form-group input.key-input{font-family:monospace;letter-spacing:1px;text-transform:uppercase;}
.login-btn{width:100%;padding:12px;background:var(--azul);color:var(--white);border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px;}
.login-btn:hover{background:var(--azul-light);}
.login-error{background:#FEE2E2;color:#991B1B;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}

/* ── App Shell ── */
#app{display:none;height:100vh;overflow:hidden;}
.app-layout{display:flex;height:100%;}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--azul);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-brand{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--white);line-height:1.1;}
.sidebar-brand span{color:var(--laranja);}
.sidebar-subtitle{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.sidebar-grafica{font-size:12px;color:rgba(255,255,255,.7);padding:12px 20px;background:rgba(0,0,0,.15);border-bottom:1px solid rgba(255,255,255,.05);}
.sidebar-grafica strong{display:block;color:var(--white);}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:12px 20px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--white);}
.nav-item.active{background:rgba(255,255,255,.12);color:var(--white);border-left-color:var(--laranja);}
.nav-item svg{flex-shrink:0;opacity:.8;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.logout-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;transition:color .2s;}
.logout-btn:hover{color:var(--white);}

/* ── Main Content ── */
.main-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--white);padding:16px 28px;border-bottom:1px solid var(--gray-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);}
.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--azul);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.badge-date{font-size:12px;color:var(--gray);background:var(--gray-lighter);padding:5px 12px;border-radius:20px;}
.page-body{padding:24px 28px;flex:1;}

/* ── Cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--azul);}
.stat-card.orange{border-left-color:var(--laranja);}
.stat-card.green{border-left-color:var(--success);}
.stat-card.blue{border-left-color:var(--info);}
.stat-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--azul);}
.stat-sub{font-size:11px;color:var(--gray);margin-top:4px;}

/* ── Charts ── */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px;}
.card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--azul);margin-bottom:16px;}

/* ── Tables ── */
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-light);}
.table-header .card-title{margin:0;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border:1.5px solid var(--gray-light);border-radius:20px;background:var(--white);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--gray);}
.filter-btn.active,.filter-btn:hover{border-color:var(--azul);background:var(--azul);color:var(--white);}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;background:var(--gray-lighter);border-bottom:1px solid var(--gray-light);}
tbody tr{border-bottom:1px solid var(--gray-light);transition:background .1s;cursor:pointer;}
tbody tr:hover{background:var(--gray-lighter);}
tbody tr:last-child{border-bottom:none;}
td{padding:12px 16px;font-size:13px;color:#374151;}

/* ── Status Badge ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-badge::before{content:'';width:6px;height:6px;border-radius:50%;}
.s-aguardando_pagamento{background:#FEF3C7;color:#92400E;} .s-aguardando_pagamento::before{background:#D97706;}
.s-pago{background:#D1FAE5;color:#065F46;} .s-pago::before{background:#10B981;}
.s-em_producao{background:#DBEAFE;color:#1E40AF;} .s-em_producao::before{background:#3B82F6;}
.s-pronto{background:#EDE9FE;color:#5B21B6;} .s-pronto::before{background:#8B5CF6;}
.s-entregue{background:#F3F4F6;color:#374151;} .s-entregue::before{background:#9CA3AF;}

/* ── Btn ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--azul);color:var(--white);}
.btn-primary:hover{background:var(--azul-light);}
.btn-orange{background:var(--laranja);color:var(--white);}
.btn-orange:hover{background:var(--laranja-light);}
.btn-outline{background:var(--white);color:var(--azul);border:1.5px solid var(--azul);}
.btn-outline:hover{background:var(--azul);color:var(--white);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{background:#FEE2E2;color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:var(--white);}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;display:none;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--azul);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;}
.modal-section{margin-bottom:16px;}
.modal-section-title{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item label{font-size:11px;color:var(--gray);display:block;margin-bottom:3px;}
.info-item span{font-size:14px;font-weight:500;color:#1F2937;}
.select-status{padding:7px 12px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;width:100%;}

/* ── OS Print ── */
.os-wrap{background:var(--white);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);max-width:740px;margin:0 auto;}
.os-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:20px;border-bottom:2px solid var(--azul);margin-bottom:20px;}
.os-logo-area .os-brand{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--azul);}
.os-logo-area .os-brand span{color:var(--laranja);}
.os-numero{text-align:right;}
.os-numero .os-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--azul);}
.os-numero small{font-size:11px;color:var(--gray);display:block;}
.os-section{margin-bottom:18px;}
.os-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--azul);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--gray-light);}
.os-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.os-field label{font-size:11px;color:var(--gray);display:block;margin-bottom:2px;}
.os-field span{font-size:13px;font-weight:500;}
.os-specs{background:var(--gray-lighter);border-radius:8px;padding:14px;}
.os-spec-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-light);font-size:13px;}
.os-spec-item:last-child{border:none;}
.os-spec-item label{color:var(--gray);}
.os-spec-item span{font-weight:600;}
.os-footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--gray-light);display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.os-assinatura{border-top:1px solid #374151;padding-top:8px;font-size:11px;color:var(--gray);text-align:center;margin-top:24px;}

/* ── Financeiro ── */
.fin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
.fin-period{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.fin-period label{font-size:12px;font-weight:600;color:var(--gray);}
.fin-period input[type=date]{padding:6px 10px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;}

/* ── Settings ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.settings-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.settings-card h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--azul);margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1.5px solid var(--gray-light);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;transition:border .2s;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--azul);}
.field textarea{resize:vertical;min-height:80px;}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--gray);}
.empty-state svg{margin:0 auto 12px;opacity:.3;}
.empty-state p{font-size:15px;}

/* ── Loader ── */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;}
.spinner{width:32px;height:32px;border:3px solid var(--gray-light);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Print ── */
@media print{
  .sidebar,.topbar,.btn,.no-print{display:none!important;}
  .main-content{overflow:visible;}
  .page-body{padding:0;}
  .os-wrap{box-shadow:none;padding:0;}
}

/* ── Responsive ── */
@media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr);}.charts-row{grid-template-columns:1fr;}.settings-grid{grid-template-columns:1fr;}}
@media(max-width:768px){:root{--sidebar-w:200px;}.page-body{padding:16px;}.stats-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">

      <div class="brand">Teffe<span>Press</span></div>

</div>

<script>
/* ─── Config ─── */
const SB_URL  = 'https://hlfjcpgrxiktgctozilk.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZmpjcGdyeGlrdGdjdG96aWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxOTIzNDgsImV4cCI6MjA5NTc2ODM0OH0.VlUw_Akg_XtxWoQgCujPkFB9QFSNARMFDWUMSkg_OGA';

let SESSION = null; // { instancia, nome_grafica, email }

const STATUS_LABELS = {
  aguardando_pagamento:'Aguard. Pagamento',
  pago:'Pago',
  em_producao:'Em Produção',
  pronto:'Pronto',
  entregue:'Entregue'
};

/* ─── SB helper ─── */
async function sbGet(path){ const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`,Accept:'application/json'}}); return r.json(); }
async function sbPost(path,data){ const r=await fetch(`${SB_URL}/rest/v1/${path}`,{method:'POST',headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(data)}); return r.json(); }
async function sbPatch(path,data){ const r=await fetch(`${SB_URL}/rest/v1/${path}`,{method:'PATCH',headers:{apikey:SB_ANON,Authorization:`Bearer ${SB_ANON}`,'Content-Type':'application/json',Prefer:'return=representation'},body:JSON.stringify(data)}); return r.json(); }

/* ─── Login ─── */
async function doLogin(){
  const chave = document.getElementById('l-chave').value.trim().toUpperCase();
  const email = document.getElementById('l-email').value.trim();
  const senha = document.getElementById('l-senha').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display='none';
  if(!email||!senha||!chave){errEl.textContent='Preencha todos os campos.';errEl.style.display='block';return;}
  const data = await sbGet(`teffe_press_licencas?chave=eq.${encodeURIComponent(chave)}&ativo=eq.true&select=instancia,nome_grafica,plano`);
  if(!Array.isArray(data)||data.length===0){errEl.textContent='Chave de licença inválida ou expirada.';errEl.style.display='block';return;}
  SESSION={instancia:data[0].instancia,nome_grafica:data[0].nome_grafica,plano:data[0].plano,email};
  localStorage.setItem('tpSession',JSON.stringify(SESSION));
  startApp();
}

function doLogout(){localStorage.removeItem('tpSession');SESSION=null;document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';}

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sidebar-grafica-nome').textContent=SESSION.nome_grafica;
  document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'long',year:'numeric'});
  goTo('dashboard');
}

/* ─── Navigation ─── */
const PAGE_TITLES={dashboard:'Dashboard',pedidos:'Pedidos',os:'Ordem de Serviço',clientes:'Clientes',financeiro:'Financeiro',configuracoes:'Configurações'};
function goTo(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`.nav-item[onclick="goTo('${page}')"]`)?.classList.add('active');
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  document.getElementById('page-body').innerHTML='<div class="loader"><div class="spinner"></div></div>';
  pages[page]();
}

/* ─── Helpers ─── */
function fmtBRL(v){return v==null?'—':'R$ '+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function fmtDate(d){if(!d)return'—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('pt-BR');}
function statusBadge(s){return`<span class="status-badge s-${s}">${STATUS_LABELS[s]||s}</span>`;}
function closeModal(id){document.getElementById(id).classList.remove('open');}

/* ─── PAGES ─── */
const pages={};

/* ── DASHBOARD ── */
pages.dashboard=async function(){
  const inst=SESSION.instancia;
  const [pedidos,clientes]=await Promise.all([
    sbGet(`teffe_press_pedidos?instancia=eq.${inst}&select=*&order=criado_em.desc`),
    sbGet(`teffe_press_clientes?instancia=eq.${inst}&select=*`)
  ]);

  const hoje=new Date().toISOString().slice(0,10);
  const mesAtual=new Date().toISOString().slice(0,7);
  const todayOrders=pedidos.filter(p=>p.criado_em?.slice(0,10)===hoje);
  const mesOrders=pedidos.filter(p=>p.criado_em?.slice(0,7)===mesAtual&&p.status!=='aguardando_pagamento');
  const faturamento=mesOrders.reduce((s,p)=>s+(p.valor||0),0);
  const emProd=pedidos.filter(p=>p.status==='em_producao');
  const prontos=pedidos.filter(p=>p.status==='pronto');

  // últimos 30 dias por dia
  const dias30=[]; const labDias=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);labDias.push(d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));dias30.push(d.toISOString().slice(0,10));}
  const contPorDia=dias30.map(d=>pedidos.filter(p=>p.criado_em?.slice(0,10)===d).length);

  // produtos mais pedidos
  const prodCount={};
  pedidos.forEach(p=>{prodCount[p.produto]=(prodCount[p.produto]||0)+1;});
  const topProd=Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('page-body').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Pedidos Hoje</div><div class="stat-value">${todayOrders.length}</div><div class="stat-sub">Novos pedidos</div></div>
      <div class="stat-card orange"><div class="stat-label">Faturamento do Mês</div><div class="stat-value">${fmtBRL(faturamento)}</div><div class="stat-sub">${mesOrders.length} pedidos pagos</div></div>
      <div class="stat-card blue"><div class="stat-label">Em Produção</div><div class="stat-value">${emProd.length}</div><div class="stat-sub">Aguardando finalização</div></div>
      <div class="stat-card green"><div class="stat-label">Prontos p/ Entrega</div><div class="stat-value">${prontos.length}</div><div class="stat-sub">Aguardando retirada</div></div>
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Pedidos nos últimos 30 dias</div>
        <canvas id="chart-pedidos" height="120"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Produtos mais pedidos</div>
        <canvas id="chart-produtos" height="200"></canvas>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="card-title">Últimos Pedidos</div><button class="btn btn-primary btn-sm" onclick="goTo('pedidos')">Ver todos</button></div>
      <table>
        <thead><tr><th>#</th><th>Cliente</th><th>Produto</th><th>Valor</th><th>Status</th><th>Prazo</th></tr></thead>
        <tbody>${pedidos.slice(0,8).map(p=>`<tr onclick="openPedido('${p.id}')"><td>#${p.numero_pedido||'—'}</td><td>${p.cliente_nome||'—'}</td><td>${p.produto}</td><td>${fmtBRL(p.valor)}</td><td>${statusBadge(p.status)}</td><td>${fmtDate(p.prazo_entrega)}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;

  new Chart(document.getElementById('chart-pedidos'),{type:'bar',data:{labels:labDias,datasets:[{label:'Pedidos',data:contPorDia,backgroundColor:'rgba(26,63,128,.7)',borderRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:10}},y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  new Chart(document.getElementById('chart-produtos'),{type:'doughnut',data:{labels:topProd.map(x=>x[0]),datasets:[{data:topProd.map(x=>x[1]),backgroundColor:['#1A3F80','#E07820','#2563EB','#16A34A','#8B5CF6'],borderWidth:0}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});

  // store pedidos globally for modal
  window._allPedidos=pedidos;
};

  const specs=p.especificacoes||{};
  document.getElementById('modal-pedido-title').textContent=`Pedido #${p.numero_pedido||'—'} — ${p.produto}`;
  document.getElementById('modal-pedido-body').innerHTML=`
    <div class="modal-section">
      <div class="modal-section-title">Cliente</div>
      <div class="info-grid">
        <div class="info-item"><label>Nome</label><span>${p.cliente_nome||'—'}</span></div>
        <div class="info-item"><label>Telefone</label><span>${p.cliente_telefone||'—'}</span></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Produto</div>
      <div class="info-grid">
        <div class="info-item"><label>Produto</label><span>${p.produto}</span></div>
        <div class="info-item"><label>Valor</label><span>${fmtBRL(p.valor)}</span></div>
        <div class="info-item"><label>Prazo de Entrega</label><span>${fmtDate(p.prazo_entrega)}</span></div>
        <div class="info-item"><label>Arte pronta</label><span>${p.arte_pronta?'Sim':'Não'}</span></div>
      </div>
    </div>
    ${Object.keys(specs).length?`<div class="modal-section"><div class="modal-section-title">Especificações</div><div class="os-specs">${Object.entries(specs).map(([k,v])=>`<div class="os-spec-item"><label>${k}</label><span>${v}</span></div>`).join('')}</div></div>`:''}
    ${p.observacoes?`<div class="modal-section"><div class="modal-section-title">Observações</div><p style="font-size:13px">${p.observacoes}</p></div>`:''}
    <div class="modal-section">
      <div class="modal-section-title">Atualizar Status</div>
      <select class="select-status" id="sel-status-${p.id}">
        ${Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}" ${p.status===k?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>

      <button class="btn btn-primary" onclick="saveStatus('${p.id}')">Salvar Status</button>

}

async function saveStatus(id){
  const s=document.getElementById(`sel-status-${id}`).value;
  await sbPatch(`teffe_press_pedidos?id=eq.${id}`,{status:s,atualizado_em:new Date().toISOString()});
  const p=window._allPedidos?.find(x=>x.id===id);
  if(p)p.status=s;
  closeModal('modal-pedido');
  pages.pedidos();
}

function openOS(id){

function printOS(id){
  const p=(window._allPedidos||[]).find(x=>x.id===id);

/* ── FINANCEIRO ── */
pages.financeiro=async function(){
  const today=new Date();
  const firstDay=new Date(today.getFullYear(),today.getMonth(),1).toISOString().slice(0,10);
  const lastDay=new Date(today.getFullYear(),today.getMonth()+1,0).toISOString().slice(0,10);

  const pedidos=await sbGet(`teffe_press_pedidos?instancia=eq.${SESSION.instancia}&select=*&order=criado_em.desc`);
  window._allPedidos=pedidos;

  function calcFin(list){
    const pagos=list.filter(p=>p.status!=='aguardando_pagamento');
    const pendentes=list.filter(p=>p.status==='aguardando_pagamento');
    const fat=pagos.reduce((s,p)=>s+(p.valor||0),0);
    const pend=pendentes.reduce((s,p)=>s+(p.valor||0),0);
    const ticket=pagos.length?fat/pagos.length:0;
    return{fat,pend,ticket,total:list.length,pagos:pagos.length,pendentes:pendentes.length};
  }

  function filterByPeriod(start,end){
    return pedidos.filter(p=>{const d=p.criado_em?.slice(0,10);return d>=start&&d<=end;});
  }

  const mesPedidos=filterByPeriod(firstDay,lastDay);
  const fin=calcFin(mesPedidos);
  const finTotal=calcFin(pedidos);

  document.getElementById('page-body').innerHTML=`
    <div class="fin-period">
      <label>Período:</label>
      <input type="date" id="fin-start" value="${firstDay}">
      <span style="font-size:13px">até</span>
      <input type="date" id="fin-end" value="${lastDay}">
      <button class="btn btn-primary btn-sm" onclick="calcPeriod()">Aplicar</button>
    </div>
    <div class="fin-grid" id="fin-cards">
      ${finCards(fin,'Mês Atual')}
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">Faturamento × Pendente (mês atual)</div>
        <canvas id="chart-fin" height="120"></canvas>
      </div>
      <div class="card">
        <div class="card-title">Totais Geral</div>
        <table>
          <tr><td style="color:var(--gray);font-size:12px;padding:6px 0">Total de pedidos</td><td style="font-weight:700">${finTotal.total}</td></tr>
          <tr><td style="color:var(--gray);font-size:12px;padding:6px 0">Pedidos pagos</td><td style="font-weight:700;color:var(--success)">${finTotal.pagos}</td></tr>
          <tr><td style="color:var(--gray);font-size:12px;padding:6px 0">A receber</td><td style="font-weight:700;color:var(--warning)">${fmtBRL(finTotal.pend)}</td></tr>
          <tr><td style="color:var(--gray);font-size:12px;padding:6px 0">Faturamento total</td><td style="font-weight:700;color:var(--azul)">${fmtBRL(finTotal.fat)}</td></tr>
          <tr><td style="color:var(--gray);font-size:12px;padding:6px 0">Ticket médio geral</td><td style="font-weight:700">${fmtBRL(finTotal.ticket)}</td></tr>
        </table>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="card-title">Pedidos do Período</div>
        <button class="btn btn-outline btn-sm no-print" onclick="exportCSV()">Exportar CSV</button>
      </div>
      <table id="fin-table">
        <thead><tr><th>#</th><th>Cliente</th><th>Produto</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead>
        <tbody>${mesPedidos.map(p=>`<tr><td>#${p.numero_pedido||'—'}</td><td>${p.cliente_nome||'—'}</td><td>${p.produto}</td><td>${fmtBRL(p.valor)}</td><td>${statusBadge(p.status)}</td><td>${p.criado_em?new Date(p.criado_em).toLocaleDateString('pt-BR'):'—'}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;

  window._finPedidos=mesPedidos;
  new Chart(document.getElementById('chart-fin'),{type:'bar',data:{labels:['Faturado','Pendente'],datasets:[{data:[fin.fat,fin.pend],backgroundColor:['rgba(22,163,74,.8)','rgba(217,119,6,.8)'],borderRadius:6}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
};

function finCards(fin,periodo){
  return `
    <div class="stat-card green"><div class="stat-label">${periodo} — Faturado</div><div class="stat-value">${fmtBRL(fin.fat)}</div><div class="stat-sub">${fin.pagos} pedidos pagos</div></div>
    <div class="stat-card orange"><div class="stat-label">A Receber</div><div class="stat-value">${fmtBRL(fin.pend)}</div><div class="stat-sub">${fin.pendentes} aguardando</div></div>
    <div class="stat-card"><div class="stat-label">Ticket Médio</div><div class="stat-value">${fmtBRL(fin.ticket)}</div><div class="stat-sub">por pedido pago</div></div>`;
}

function calcPeriod(){
  const start=document.getElementById('fin-start').value;
  const end=document.getElementById('fin-end').value;
  const all=window._allPedidos||[];
  const filtered=all.filter(p=>{const d=p.criado_em?.slice(0,10);return d>=start&&d<=end;});
  const fin={};
  const pagos=filtered.filter(p=>p.status!=='aguardando_pagamento');
  const pendentes=filtered.filter(p=>p.status==='aguardando_pagamento');
  fin.fat=pagos.reduce((s,p)=>s+(p.valor||0),0);
  fin.pend=pendentes.reduce((s,p)=>s+(p.valor||0),0);
  fin.ticket=pagos.length?fin.fat/pagos.length:0;
  fin.pagos=pagos.length;fin.pendentes=pendentes.length;
  document.getElementById('fin-cards').innerHTML=finCards(fin,'Período');
  window._finPedidos=filtered;
  const tbody=document.querySelector('#fin-table tbody');
  tbody.innerHTML=filtered.map(p=>`<tr><td>#${p.numero_pedido||'—'}</td><td>${p.cliente_nome||'—'}</td><td>${p.produto}</td><td>${fmtBRL(p.valor)}</td><td>${statusBadge(p.status)}</td><td>${p.criado_em?new Date(p.criado_em).toLocaleDateString('pt-BR'):'—'}</td></tr>`).join('');
}

function exportCSV(){
  const p=window._finPedidos||[];
  const header='Numero,Cliente,Produto,Valor,Status,Data';
  const rows=p.map(x=>`${x.numero_pedido||''},${x.cliente_nome||''},${x.produto},${x.valor||0},${STATUS_LABELS[x.status]||x.status},${x.criado_em?new Date(x.criado_em).toLocaleDateString('pt-BR'):''}`);
  const csv=[header,...rows].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`pedidos-${SESSION.nome_grafica}-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
